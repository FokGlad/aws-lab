name: Ansible Lint

on:
  pull_request:
    paths:
      - 'ansible/**'
  push:
    branches: [main]
    paths:
      - 'ansible/**'

jobs:
  lint:
    name: "Ansible Lint & Syntax Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Ansible syntax check
        run: |
          ansible-playbook ansible/playbooks/site.yml --syntax-check -i ansible/inventories/dev/hosts
          ansible-playbook ansible/playbooks/deploy.yml --syntax-check -i ansible/inventories/dev/hosts

      - name: Ansible lint
        run: |
          ansible-lint ansible/
